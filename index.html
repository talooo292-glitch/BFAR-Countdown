<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFAR | Season 4 Countdown</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Tahoma, sans-serif;
      background: #061521;
    }

    body {
      background-image:
        linear-gradient(rgba(0, 15, 30, 0.18), rgba(0, 15, 30, 0.18)),
        url("./background.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .countdown {
      position: relative;
      z-index: 2;
      text-align: center;
      color: #fff;
      padding: 30px;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.9);
    }

    .title {
      font-size: clamp(24px, 2.3vw, 44px);
      font-weight: 800;
      margin-bottom: 22px;
    }

    .timer {
      direction: ltr;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: clamp(10px, 2vw, 35px);
    }

    .time-box {
      min-width: clamp(75px, 9vw, 150px);
    }

    .number {
      display: block;
      font-size: clamp(48px, 6vw, 105px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 3px;
    }

    .label {
      display: block;
      margin-top: 12px;
      font-size: clamp(13px, 1.1vw, 20px);
      font-weight: 700;
    }

    .separator {
      font-size: clamp(45px, 5vw, 90px);
      font-weight: 400;
      line-height: 0.9;
    }

    .logo {
      position: absolute;
      right: 25px;
      bottom: 25px;
      width: clamp(70px, 6vw, 120px);
      height: auto;
      z-index: 3;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.35);
    }

    .finished {
      font-size: clamp(30px, 4vw, 70px);
      font-weight: 900;
    }

    @media (max-width: 700px) {
      .timer {
        gap: 7px;
      }

      .time-box {
        min-width: 58px;
      }

      .logo {
        width: 65px;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>

<body>

  <main class="page">

    <div class="countdown" id="countdown">
      <div class="title">العد التنازلي لبداية الموسم الرابع</div>

      <div class="timer">

        <div class="time-box">
          <span class="number" id="days">00</span>
          <span class="label">يوم</span>
        </div>

        <div class="separator">:</div>

        <div class="time-box">
          <span class="number" id="hours">00</span>
          <span class="label">ساعة</span>
        </div>

        <div class="separator">:</div>

        <div class="time-box">
          <span class="number" id="minutes">00</span>
          <span class="label">دقيقة</span>
        </div>

        <div class="separator">:</div>

        <div class="time-box">
          <span class="number" id="seconds">00</span>
          <span class="label">ثانية</span>
        </div>

      </div>
    </div>

    <img src="./logo.jpg" class="logo" alt="BFAR">

  </main>

  <script>
    // موعد الإطلاق: 21 يوليو 2026 الساعة 6 مساءً بتوقيت السعودية
    const targetDate = new Date("2026-07-21T18:00:00+03:00").getTime();

    function updateCountdown() {

      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance <= 0) {
        document.getElementById("countdown").innerHTML =
          '<div class="finished">انطلق الموسم الرابع!</div>';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor(
        (distance % (1000 * 60 * 60 * 24)) /
        (1000 * 60 * 60)
      );

      const minutes = Math.floor(
        (distance % (1000 * 60 * 60)) /
        (1000 * 60)
      );

      const seconds = Math.floor(
        (distance % (1000 * 60)) /
        1000
      );

      document.getElementById("days").textContent =
        String(days).padStart(2, "0");

      document.getElementById("hours").textContent =
        String(hours).padStart(2, "0");

      document.getElementById("minutes").textContent =
        String(minutes).padStart(2, "0");

      document.getElementById("seconds").textContent =
        String(seconds).padStart(2, "0");
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>

</body>
</html>
